<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hallo 🐢</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #08140f;
      --bg2: #0f2b20;
      --card: rgba(255,255,255,0.08);
      --text: #f5fff9;
      --accent: #7ef0b2;
      --accent-2: #b9ffd8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #123526 0%, transparent 35%),
        radial-gradient(circle at bottom right, #0c4b30 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }
    .wrap {
      text-align: center;
      padding: 3rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .turtle {
      font-size: clamp(3rem, 10vw, 5rem);
      filter: drop-shadow(0 0 18px rgba(126, 240, 178, 0.35));
      animation: bob 3s ease-in-out infinite;
      display: inline-block;
      margin-bottom: 1rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(4rem, 16vw, 11rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 0.9;
      color: var(--accent-2);
      text-shadow: 0 0 30px rgba(126, 240, 178, 0.18);
    }
    p {
      margin: 1rem 0 0;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(245,255,249,0.82);
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="turtle" aria-hidden="true">🐢</div>
    <h1>HALLO</h1>
    <p>Freundlich aus dem Internet zurückgewunken.</p>
  </main>
</body>
</html>
